<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dinner Party Invitation</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Poppins:wght@300;400;500&display=swap');
        
        body {
            background-color: #f9f6f0;
            color: #333333;
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden; 
        }

        /* =========================================
           ENVELOPE & ANIMATION STYLES
           ========================================= */
        .envelope-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background-color: #f9f6f0;
            z-index: 100;
            transition: opacity 1s ease;
        }

        .envelope {
            position: relative;
            width: 320px;
            height: 220px;
            background: #e0d8c3;
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .envelope::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            border-top: 110px solid transparent;
            border-bottom: 110px solid transparent;
            border-left: 160px solid #d6ceb5;
            z-index: 2;
        }
        .envelope::after {
            content: '';
            position: absolute;
            top: 0; right: 0;
            border-top: 110px solid transparent;
            border-bottom: 110px solid transparent;
            border-right: 160px solid #d6ceb5;
            z-index: 2;
        }

        .bottom-pocket {
            position: absolute;
            bottom: 0; left: 0;
            border-left: 160px solid transparent;
            border-right: 160px solid transparent;
            border-bottom: 120px solid #e0d8c3;
            z-index: 3;
        }

        .flap {
            position: absolute;
            top: 0; left: 0;
            border-left: 160px solid transparent;
            border-right: 160px solid transparent;
            border-top: 120px solid #cbbfa1;
            z-index: 4;
            transform-origin: top;
            transition: transform 0.6s ease-in-out;
        }

        .letter {
            position: absolute;
            top: 10px; left: 10px; right: 10px; bottom: 10px;
            background: #fff;
            border: 1px solid #e0d8c3;
            z-index: 1;
            transition: transform 0.6s ease-in-out;
        }

        .tap-text {
            margin-top: 50px;
            font-size: 1.1rem;
            color: #7a6a53;
            letter-spacing: 2px;
            text-transform: uppercase;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }

        .open-flap {
            transform: rotateX(180deg);
            z-index: 1 !important;
        }
        .pull-letter {
            transform: translateY(-80px);
        }

        /* =========================================
           ACTUAL INVITATION CARD STYLES
           ========================================= */
        .actual-card-container {
            display: none;
            opacity: 0;
            transition: opacity 1.2s ease-in-out;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .card {
            background: #ffffff;
            padding: 50px 40px;
            border-radius: 10px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.08);
            max-width: 450px;
            width: 85%;
            text-align: center;
            margin: 20px 0;
            position: relative; 
        }

        /* Inner structural border */
        .card::before {
            content: '';
            position: absolute;
            top: 20px; left: 20px; right: 20px; bottom: 20px;
            border: 1px solid #e0d8c3;
            border-radius: 5px;
            pointer-events: none;
        }

        /* The 4 decorative corners */
        .corner {
            position: absolute;
            width: 40px;
            height: 40px;
            border: 2px solid #b89f65;
            pointer-events: none;
        }
        .corner-tl { top: 12px; left: 12px; border-right: none; border-bottom: none; border-top-left-radius: 8px; }
        .corner-tr { top: 12px; right: 12px; border-left: none; border-bottom: none; border-top-right-radius: 8px; }
        .corner-bl { bottom: 12px; left: 12px; border-right: none; border-top: none; border-bottom-left-radius: 8px; }
        .corner-br { bottom: 12px; right: 12px; border-left: none; border-top: none; border-bottom-right-radius: 8px; }

        .card-content {
            position: relative;
            z-index: 2;
        }

        /* Fixed Bismillah to ALWAYS stay on one line */
        .bismillah {
            font-size: 2.2rem;
            color: #7a6a53;
            margin-bottom: 15px;
            font-family: "Traditional Arabic", "Amiri", serif; 
            white-space: nowrap; /* Strictly prevents breaking onto a second line */
        }
        
        .hosts {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: #2c2c2c;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .intro {
            font-size: 0.95rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #7a6a53;
            margin-bottom: 20px;
        }
        .title {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            color: #2c2c2c;
            margin: 10px 0 25px 0;
            font-style: italic;
        }
        .details {
            font-size: 1rem;
            line-height: 1.8;
            margin-bottom: 25px;
        }
        .date-time {
            font-weight: 500;
            font-size: 1.1rem;
            color: #2c2c2c;
        }
        .venue {
            margin-top: 25px;
            padding-top: 25px;
            border-top: 1px solid #e0d8c3;
        }
        .venue-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            font-weight: 600;
            color: #2c2c2c;
        }
        .map-btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background-color: #2c2c2c;
            color: #ffffff;
            text-decoration: none;
            border-radius: 5px;
            font-size: 0.9rem;
            transition: background-color 0.3s ease;
        }
        .map-btn:hover {
            background-color: #555555;
        }

        /* =========================================
           MEDIA QUERIES (MOBILE & TABLET RESPONSIVENESS)
           ========================================= */
        
        @media screen and (max-width: 768px) {
            .card {
                padding: 40px 30px;
                width: 90%;
            }
            .title {
                font-size: 2.4rem;
            }
            .hosts {
                font-size: 1.6rem;
            }
            /* Adjust Bismillah for tablets */
            .bismillah {
                font-size: 1.8rem;
            }
        }

        @media screen and (max-width: 480px) {
            .card {
                padding: 30px 20px;
                width: 92%;
            }
            .card::before { top: 12px; left: 12px; right: 12px; bottom: 12px; }
            .corner { width: 25px; height: 25px; }
            .corner-tl { top: 6px; left: 6px; }
            .corner-tr { top: 6px; right: 6px; }
            .corner-bl { bottom: 6px; left: 6px; }
            .corner-br { bottom: 6px; right: 6px; }

            /* Fixes the Bismillah for mobile so it fits on one line */
            .bismillah {
                font-size: 1.4rem; 
                margin-bottom: 10px;
            }

            .title {
                font-size: 2rem;
                margin: 10px 0 20px 0;
            }
            .hosts {
                font-size: 1.4rem;
            }
            .intro {
                font-size: 0.85rem;
            }
            .details {
                font-size: 0.9rem;
                margin-bottom: 20px;
            }
            .date-time {
                font-size: 1rem;
            }
            .venue-name {
                font-size: 1.2rem;
            }
            .envelope {
                transform: scale(0.9);
            }
            .pull-letter {
                transform: translateY(-60px) scale(0.9);
            }
        }

        @media screen and (max-width: 350px) {
            .envelope {
                transform: scale(0.75);
            }
            .pull-letter {
                transform: translateY(-50px) scale(0.75);
            }
            .title {
                font-size: 1.8rem;
            }
            /* Scales it down slightly more for tiny screens to guarantee a single line */
            .bismillah {
                font-size: 1.2rem; 
            }
        }
    </style>
</head>
<body>

    <div class="envelope-wrapper" id="envelopeWrapper" onclick="openInvitation()">
        <div class="envelope">
            <div class="flap" id="flap"></div>
            <div class="letter" id="letter"></div>
            <div class="bottom-pocket"></div>
        </div>
        <div class="tap-text">Tap to Open</div>
    </div>

    <div class="actual-card-container" id="actualCard">
        <div class="card">
            
            <div class="corner corner-tl"></div>
            <div class="corner corner-tr"></div>
            <div class="corner corner-bl"></div>
            <div class="corner corner-br"></div>

            <div class="card-content">
                
                <div class="bismillah">﷽</div>
                
                <div class="hosts">Mrs & Mr Abdul Qadeer</div>
                
                <div class="intro">cordially invite you to attend a</div>
                
                <div class="title">Family Dinner Gathering</div>
                
                <div class="details">
                    May Allah fill our evening with peace, joy, and Barakah.
                </div>
                
                <div class="details date-time">
                    Monday, 15 June, 2026<br>
                    8:00 PM Onwards
                </div>
                
                <div class="venue">
                    <div class="details"><strong>Venue:</strong></div>
                    <div class="venue-name">The City Cheff</div>
                    <div class="details" style="font-size: 0.9rem; color: #666; margin-top: 5px;">
                        Floor No. 3, Land Mall, Centre Point<br>
                        Marris Rd, Aligarh
                    </div>
                    
                    <a href="https://www.google.com/maps/search/?api=1&query=The+City+Cheff+Aligarh" target="_blank" class="map-btn">
                        View on Google Maps
                    </a>
                </div>
            </div>
            
        </div>
    </div>

    <script>
        document.getElementById('actualCard').style.display = 'none';

        function openInvitation() {
            const envelopeWrapper = document.getElementById('envelopeWrapper');
            const flap = document.getElementById('flap');
            const letter = document.getElementById('letter');
            const actualCard = document.getElementById('actualCard');

            flap.classList.add('open-flap');

            setTimeout(() => {
                letter.classList.add('pull-letter');
            }, 500);

            setTimeout(() => {
                envelopeWrapper.style.opacity = '0';
                actualCard.style.display = 'flex';
                
                setTimeout(() => {
                    actualCard.style.opacity = '1';
                    document.body.style.overflow = 'auto'; 
                    
                    setTimeout(() => {
                        envelopeWrapper.style.display = 'none';
                    }, 1000);

                }, 50);

            }, 1300);
        }
    </script>
</body>
</html>
