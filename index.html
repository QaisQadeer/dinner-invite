<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dinner Party Invitation</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Poppins:wght@300;400;500&display=swap');
        
        body {
            background-color: #f9f6f0; /* Warm off-white background */
            color: #333333;
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
        }
        .card {
            background: #ffffff;
            padding: 50px 40px;
            border-radius: 10px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.08);
            max-width: 450px;
            width: 85%;
            border: 1px solid #e0d8c3;
        }
        .hosts {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: #2c2c2c;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .intro {
            font-size: 0.95rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #7a6a53;
            margin-bottom: 20px;
        }
        .title {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            color: #2c2c2c;
            margin: 10px 0 25px 0;
            font-style: italic;
        }
        .details {
            font-size: 1rem;
            line-height: 1.8;
            margin-bottom: 25px;
        }
        .date-time {
            font-weight: 500;
            font-size: 1.1rem;
            color: #2c2c2c;
        }
        .venue {
            margin-top: 25px;
            padding-top: 25px;
            border-top: 1px solid #e0d8c3;
        }
        .venue-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            font-weight: 600;
            color: #2c2c2c;
        }
        .map-btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background-color: #2c2c2c;
            color: #ffffff;
            text-decoration: none;
            border-radius: 5px;
            font-size: 0.9rem;
            transition: background-color 0.3s ease;
        }
        .map-btn:hover {
            background-color: #555555;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="bismillah">﷽<br>
        <!-- Added Host Names Here -->
        <div class="hosts">Mrs & Mr Abdul Qadeer</div>
        
        <!-- Adjusted Intro Text -->
        <div class="intro">cordially invite you to attend a</div>
        
        <div class="title">Family Dinner Gathering</div>
        
        <div class="details">
            May Allah fill our evening with peace, joy, and Barakah.
        </div>
        
        <div class="details date-time">
            <!-- Replace with your actual date and time -->
            Monday, 15 June, 2026<br>
            8:00 PM Onwards
        </div>
        
        <div class="venue">
            <div class="details"><strong>Venue:</strong></div>
            <div class="venue-name">The City Cheff</div>
            <div class="details" style="font-size: 0.9rem; color: #666; margin-top: 5px;">
                Floor No. 3, Land Mall, Centre Point<br>
                Marris Rd, Aligarh
            </div>
            
            <!-- Map Link Button -->
            <a href="https://www.google.com/maps/search/?api=1&query=The+City+Cheff+Aligarh" target="_blank" class="map-btn">
                View on Google Maps
            </a>
        </div>
    </div>
</body>
</html>
